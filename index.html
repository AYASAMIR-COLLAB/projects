<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link href="sheet.css" rel="stylesheet">
        <script defer src="script.js"></script>
</head>
<body>
    <div class="main">
        <form name="form">
            <input type="text" name="textview" class="textview">
        </form>

        <div class="clearfix">
            <div class="col-3"><input type="button" value="C" class="button top-button" onclick="clean()"></div>
            <div class="col-3"><input type="button" value="±" class="button top-button" onclick="toggleSign()"></div>
            <div class="col-3"><input type="button" value="⌫" class="button top-button" onclick="back()"></div>
            <div class="col-3"><input type="button" value="÷" class="button operator" onclick="insert('/')"></div>
        </div>

        <div class="clearfix">
            <div class="col-3"><input type="button" value="7" class="button digit" onclick="insert(7)"></div>
            <div class="col-3"><input type="button" value="8" class="button digit" onclick="insert(8)"></div>
            <div class="col-3"><input type="button" value="9" class="button digit" onclick="insert(9)"></div>
            <div class="col-3"><input type="button" value="×" class="button operator" onclick="insert('*')"></div>
        </div>

        <div class="clearfix">
            <div class="col-3"><input type="button" value="4" class="button digit" onclick="insert(4)"></div>
            <div class="col-3"><input type="button" value="5" class="button digit" onclick="insert(5)"></div>
            <div class="col-3"><input type="button" value="6" class="button digit" onclick="insert(6)"></div>
            <div class="col-3"><input type="button" value="-" class="button operator" onclick="insert('-')"></div>
        </div>

        <div class="clearfix">
            <div class="col-3"><input type="button" value="1" class="button digit" onclick="insert(1)"></div>
            <div class="col-3"><input type="button" value="2" class="button digit" onclick="insert(2)"></div>
            <div class="col-3"><input type="button" value="3" class="button digit" onclick="insert(3)"></div>
            <div class="col-3"><input type="button" value="+" class="button operator" onclick="insert('+')"></div>
        </div>

        <div class="clearfix">
            <div class="col-3"><input type="button" value="0" class="button digit" onclick="insert(0)"></div>
            <div class="col-3"><input type="button" value="." class="button digit" onclick="insert('.')"></div>
            <div class="col-6"><input type="button" value="=" class="button equal" onclick="equal()"></div>
        </div>
    </div>


</body>
</html>
